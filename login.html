<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetDesk — Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --card: #0f1629;
            --border: #1e3a5f;
            --blue: #2563eb;
            --cyan: #06b6d4;
            --text: #e2e8f0;
            --muted: #64748b;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .grid-bg {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(37,99,235,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(37,99,235,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glow {
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
            top: -100px; left: -100px;
        }
        .glow2 {
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
            bottom: -100px; right: -50px;
        }
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
        }
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 600;
            color: var(--cyan);
        }
        .brand-name span { color: var(--blue); }
        .brand-sub {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.78rem; color: #94a3b8; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.04em; }
        input {
            width: 100%;
            background: #0a0e1a;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.7rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'Sora', sans-serif;
            transition: border-color 0.18s;
        }
        input:focus { outline: none; border-color: var(--blue); }
        .btn-login {
            width: 100%;
            background: var(--blue);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            transition: all 0.18s;
            margin-top: 0.5rem;
        }
        .btn-login:hover { background: #1d4ed8; transform: translateY(-1px); }
        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 1.2rem;
        }
        .alt-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .alt-link a { color: var(--cyan); text-decoration: none; font-weight: 600; }
        .demo-hint {
            margin-top: 1.5rem;
            padding: 0.85rem 1rem;
            background: rgba(6,182,212,0.06);
            border: 1px solid rgba(6,182,212,0.15);
            border-radius: 8px;
            font-size: 0.78rem;
            color: #67e8f9;
            font-family: 'JetBrains Mono', monospace;
        }
        .demo-hint strong { color: var(--cyan); }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow"></div>
    <div class="glow2"></div>

    <div class="login-card">
        <div class="brand">
            <div class="brand-name">Net<span>Desk</span></div>
            <div class="brand-sub">Network &amp; IT Management System</div>
        </div>

        {% if error %}
        <div class="error-box"><i class="bi bi-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="post" action="/auth/login">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>

        <div class="alt-link">
            Don't have an account? <a href="/auth/register">Register here</a>
        </div>

        <div class="demo-hint">
            <strong>Demo Credentials:</strong><br>
            Admin: admin / admin123<br>
            Tech: tech1 / tech123
        </div>
    </div>
</body>
</html>
