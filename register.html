<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetDesk — Register</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0e1a; --card: #0f1629; --border: #1e3a5f; --blue: #2563eb; --cyan: #06b6d4; --text: #e2e8f0; --muted: #64748b; }
        * { box-sizing: border-box; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(37,99,235,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(37,99,235,0.05) 1px, transparent 1px); background-size: 40px 40px; }
        .register-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 440px; position: relative; z-index: 10; }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand-name { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 600; color: var(--cyan); }
        .brand-name span { color: var(--blue); }
        .brand-sub { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }
        .form-group { margin-bottom: 1.1rem; }
        label { display: block; font-size: 0.78rem; color: #94a3b8; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; background: #0a0e1a; border: 1px solid var(--border); color: var(--text); padding: 0.65rem 0.9rem; border-radius: 8px; font-size: 0.875rem; font-family: 'Sora', sans-serif; transition: border-color 0.18s; }
        input:focus, select:focus { outline: none; border-color: var(--blue); }
        select option { background: var(--card); }
        .btn-register { width: 100%; background: var(--blue); color: white; border: none; padding: 0.8rem; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Sora', sans-serif; transition: all 0.18s; margin-top: 0.5rem; }
        .btn-register:hover { background: #1d4ed8; }
        .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.82rem; margin-bottom: 1rem; }
        .alt-link { text-align: center; margin-top: 1.2rem; font-size: 0.82rem; color: var(--muted); }
        .alt-link a { color: var(--cyan); text-decoration: none; font-weight: 600; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="register-card">
        <div class="brand">
            <div class="brand-name">Net<span>Desk</span></div>
            <div class="brand-sub">Create Your Account</div>
        </div>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="post" action="/auth/register">
            <div class="row-2">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="username" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select name="role">
                        <option value="viewer">Viewer</option>
                        <option value="technician">Technician</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 6 characters" required>
            </div>
            <button type="submit" class="btn-register">Create Account →</button>
        </form>

        <div class="alt-link">
            Already have an account? <a href="/auth/login">Sign in</a>
        </div>
    </div>
</body>
</html>
